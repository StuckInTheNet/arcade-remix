<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="800" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0c14"/>
      <stop offset="50%" stop-color="#15152a"/>
      <stop offset="100%" stop-color="#0c0c14"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e3a"/>
      <stop offset="100%" stop-color="#15152a"/>
    </linearGradient>
    <linearGradient id="create" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1540"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <filter id="glow1"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="12" fill="url(#gbg)"/>

  <!-- Row 1 -->
  <g transform="translate(25, 20)">
    <!-- Tetris -->
    <rect x="0" y="0" width="175" height="80" rx="10" fill="url(#card)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
    <text x="88" y="38" font-size="28" text-anchor="middle">🧱</text>
    <text x="88" y="58" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f0f0f5" text-anchor="middle" letter-spacing="1.5">TETRIS</text>
    <text x="88" y="72" font-family="monospace" font-size="9" fill="#5a5a7a" text-anchor="middle">Puzzle</text>

    <!-- Snake -->
    <rect x="190" y="0" width="175" height="80" rx="10" fill="url(#card)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
    <text x="278" y="38" font-size="28" text-anchor="middle">🐍</text>
    <text x="278" y="58" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f0f0f5" text-anchor="middle" letter-spacing="1.5">SNAKE</text>
    <text x="278" y="72" font-family="monospace" font-size="9" fill="#5a5a7a" text-anchor="middle">Arcade</text>

    <!-- Breakout -->
    <rect x="380" y="0" width="175" height="80" rx="10" fill="url(#card)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
    <text x="468" y="38" font-size="28" text-anchor="middle">🧨</text>
    <text x="468" y="58" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f0f0f5" text-anchor="middle" letter-spacing="1.5">BREAKOUT</text>
    <text x="468" y="72" font-family="monospace" font-size="9" fill="#5a5a7a" text-anchor="middle">Action</text>

    <!-- Invaders -->
    <rect x="570" y="0" width="175" height="80" rx="10" fill="url(#card)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
    <text x="658" y="38" font-size="28" text-anchor="middle">👾</text>
    <text x="658" y="58" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f0f0f5" text-anchor="middle" letter-spacing="1.5">INVADERS</text>
    <text x="658" y="72" font-family="monospace" font-size="9" fill="#5a5a7a" text-anchor="middle">Shooter</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(25, 110)">
    <rect x="0" y="0" width="175" height="80" rx="10" fill="url(#card)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
    <text x="88" y="38" font-size="28" text-anchor="middle">🏓</text>
    <text x="88" y="58" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f0f0f5" text-anchor="middle" letter-spacing="1.5">PONG</text>
    <text x="88" y="72" font-family="monospace" font-size="9" fill="#5a5a7a" text-anchor="middle">Sports</text>

    <rect x="190" y="0" width="175" height="80" rx="10" fill="url(#card)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
    <text x="278" y="38" font-size="28" text-anchor="middle">🏃</text>
    <text x="278" y="58" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f0f0f5" text-anchor="middle" letter-spacing="1.5">RUNNER</text>
    <text x="278" y="72" font-family="monospace" font-size="9" fill="#5a5a7a" text-anchor="middle">Runner</text>

    <rect x="380" y="0" width="175" height="80" rx="10" fill="url(#card)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
    <text x="468" y="38" font-size="28" text-anchor="middle">🐦</text>
    <text x="468" y="58" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f0f0f5" text-anchor="middle" letter-spacing="1.5">FLAPPY</text>
    <text x="468" y="72" font-family="monospace" font-size="9" fill="#5a5a7a" text-anchor="middle">Arcade</text>

    <rect x="570" y="0" width="175" height="80" rx="10" fill="url(#card)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
    <text x="658" y="38" font-size="28" text-anchor="middle">☄️</text>
    <text x="658" y="58" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f0f0f5" text-anchor="middle" letter-spacing="1.5">ASTEROIDS</text>
    <text x="658" y="72" font-family="monospace" font-size="9" fill="#5a5a7a" text-anchor="middle">Shooter</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(25, 200)">
    <rect x="0" y="0" width="175" height="80" rx="10" fill="url(#card)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
    <text x="88" y="38" font-size="28" text-anchor="middle">💎</text>
    <text x="88" y="58" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f0f0f5" text-anchor="middle" letter-spacing="1.5">MATCH 3</text>
    <text x="88" y="72" font-family="monospace" font-size="9" fill="#5a5a7a" text-anchor="middle">Puzzle</text>

    <rect x="190" y="0" width="175" height="80" rx="10" fill="url(#card)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
    <text x="278" y="38" font-size="28" text-anchor="middle">🏔️</text>
    <text x="278" y="58" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f0f0f5" text-anchor="middle" letter-spacing="1.5">PLATFORMER</text>
    <text x="278" y="72" font-family="monospace" font-size="9" fill="#5a5a7a" text-anchor="middle">Platform</text>

    <rect x="380" y="0" width="175" height="80" rx="10" fill="url(#card)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
    <text x="468" y="38" font-size="28" text-anchor="middle">⚡</text>
    <text x="468" y="58" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f0f0f5" text-anchor="middle" letter-spacing="1.5">DODGE</text>
    <text x="468" y="72" font-family="monospace" font-size="9" fill="#5a5a7a" text-anchor="middle">Action</text>

    <!-- Create card - special dashed border -->
    <rect x="570" y="0" width="175" height="80" rx="10" fill="url(#create)" stroke="rgba(139,92,246,0.35)" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="658" y="38" font-size="28" text-anchor="middle">🎨</text>
    <text x="658" y="58" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#8b5cf6" text-anchor="middle" letter-spacing="1.5">CREATE</text>
    <text x="658" y="72" font-family="monospace" font-size="9" fill="#5a5a7a" text-anchor="middle">Build your own</text>
  </g>

  <!-- Subtle corner accents -->
  <circle cx="15" cy="15" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="785" cy="15" r="3" fill="#f472b6" opacity="0.4"/>
  <circle cx="15" cy="305" r="3" fill="#f472b6" opacity="0.4"/>
  <circle cx="785" cy="305" r="3" fill="#8b5cf6" opacity="0.4"/>
</svg>
